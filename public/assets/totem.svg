<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Totem Base Pole -->
  <rect x="26" y="10" width="12" height="50" fill="#d35400" />
  
  <!-- Top Face (Eagle/Bird) -->
  <rect x="24" y="10" width="16" height="14" rx="2" fill="#f39c12" />
  <polygon points="12,14 24,14 24,20 12,20" fill="#f1c40f" /> <!-- Left Wing -->
  <polygon points="52,14 40,14 40,20 52,20" fill="#f1c40f" /> <!-- Right Wing -->
  <circle cx="28" cy="16" r="2" fill="#000" />
  <circle cx="36" cy="16" r="2" fill="#000" />
  
  <!-- Middle Face (Bear) -->
  <rect x="22" y="26" width="20" height="14" rx="2" fill="#c0392b" />
  <circle cx="27" cy="31" r="2" fill="#fff" />
  <circle cx="37" cy="31" r="2" fill="#fff" />
  <rect x="28" y="36" width="8" height="2" fill="#000" />
  
  <!-- Bottom Face (Wolf) -->
  <rect x="24" y="42" width="16" height="14" rx="2" fill="#2980b9" />
  <polygon points="24,42 20,38 28,42" fill="#2980b9" /> <!-- Left Ear -->
  <polygon points="40,42 44,38 36,42" fill="#2980b9" /> <!-- Right Ear -->
  <circle cx="29" cy="48" r="2" fill="#fff" />
  <circle cx="35" cy="48" r="2" fill="#fff" />
</svg>
